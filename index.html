<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard SATU HATI Net.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-container">
        <header>
            <h1 class="brand-title">SATU HATI <span class="accent">Net.</span></h1>
            <p class="motto">"Lakukan yang termudah, yang ringan, yang terdekat, yang dikenal dan yang terbiasa."</p>
        </header>

        <main class="dashboard-grid">
            <!-- Kartu Fitur 1 -->
            <section class="card">
                <h3>Status Koneksi</h3>
                <div class="status-indicator">Online</div>
            </section>

            <!-- Kartu Fitur 2 -->
            <section class="card">
                <h3>Layanan</h3>
                <p>Jual Jasa & Digital Solution</p>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
